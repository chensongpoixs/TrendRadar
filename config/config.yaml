app:
  name: "趋势雷达"
  environment: "development"
  timezone: "Asia/Shanghai"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 20900
  mode: "debug"
  # 非空时从该目录提供已构建的前端（npm run build 输出，需含 index.html；相对路径相对「本文件所在目录」= backend-go/config/）
  # 与 frontend-vue 同级时须写 ../../frontend-vue/dist（多一级 ../ 到仓库根，再到 frontend-vue）
  web_root: "../../frontend-vue/dist"

# 结构化日志：zap + lumberjack 轮转；标准库 log 会重定向到同一套输出（redirect_std: true）
logging:
  enabled: true
  level: "info"           # debug | info | warn | error
  file: "logs/trendradar.log"  # 相对工作目录；与 config 同级的 logs 目录需可写
  max_size_mb: 100
  max_backups: 7
  max_age_days: 30
  compress: true          # 轮转旧文件 gzip
  console: true             # 同时输出到 stderr
  json_file: true           # 落盘 JSON 行（便于 ELK/Loki）；false 为类 console 文本
  redirect_std: true        # 将 import "log" 打到 zap（含 scheduler/ai 等模块）

scheduler:
  enabled: true
  # 可选: always_on(每天24次整点) daytime_8_23(每天8–23点整点) morning_evening office_hours night_owl
  preset: "daytime_8_23" # 每天 8:00–23:00 每个整点拉取并邮件推送

database:
  driver: "sqlite"
  database: "trendradar.db"
  max_idle_conns: 10
  max_open_conns: 100

platforms:
  enabled: true
  sources:
    - id: "toutiao"
      name: "今日头条"
      enabled: true
    - id: "baidu"
      name: "百度热搜"
      enabled: true
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      enabled: true
    - id: "thepaper"
      name: "澎湃新闻"
      enabled: true
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
      enabled: true
    - id: "cls-hot"
      name: "财联社热门"
      enabled: true
    - id: "ifeng"
      name: "凤凰网"
      enabled: true
    - id: "tieba"
      name: "贴吧"
      enabled: true
    - id: "weibo"
      name: "微博"
      enabled: true
    - id: "douyin"
      name: "抖音"
      enabled: true
    - id: "zhihu"
      name: "知乎"
      enabled: true

rss:
  enabled: true
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
      enabled: true
      max_items: 50
  freshness_filter:
    enabled: true
    max_age_days: 1

# AI 兴趣：默认从同目录 ai_interests.txt 加载（与根目录 config/ai_analysis_prompt 分析视角对齐）
# 不填 interests_file 时，仅使用下方 interests 内联文本
filter:
  method: "ai"
  interests_file: "ai_interests.txt"
  # 当 ai_interests.txt 不存在或不可读时的回退（可留空，则 AI 过滤不生效直到文件就绪）
  interests: ""

ai:
  #model: "gemma-4-26B-A4B-it-Q4_K_M"
  model: "claude-sonnet-4-6" # 模型标识（格式: provider/model_name）
  api_base: "http://127.0.0.1:11434" # 自定义 API 端点（可选，大多数情况留空）
  #api_base: "https://key.simpleai.com.cn"
  api_key: "ddd" # API Key（建议使用环境变量 AI_API_KEY）
  timeout: 3000 # 请求超时时间（秒）
  temperature: 1.0 # 采样温度 (0.0-2.0)
  max_tokens: 102400 # 最大生成 token 数
  num_retries: 10 # 失败重试次数

# 兴趣标题过滤：分批 + 单批输入上限 + 可选输出 cap（详见 docs/ai-filter-batching.md）
ai_filter:
  batch_size: 18 # 每批最多条数（与 max_input_chars 取更紧的约束）
  max_input_chars: 12000 # 单批 user 内容 rune 上限，含兴趣长文+标题列表+模板尾；0=只按条数
  batch_interval: 3000 # 批次间间隔（毫秒），本机 Ollama 时略作喘息；0=不睡
  max_output_tokens: 16384 # 本任务单请求 max_tokens，避免 JSON 被压满才截断、content 变空
  min_score: 0.7

ai_analysis:
  enabled: true
  mode: "current"
  max_news_for_analysis: 80

notification:
  enabled: true
  channels:
    email:
      from: "15850774503@163.com" # 例如: your_mail@163.com
      password: "SYhwjQhsBimapRd3" # 163 邮箱授权码（不是登录密码）
      to: "15850774503@163.com"
      smtp_server: "smtp.163.com"
      smtp_port: "465"

storage:
  backend: "local"
  formats:
    sqlite: true
    html: false
    txt: false
  local:
    data_dir: "./data"
    retention_days: 30

advanced:
  debug: false
  crawler:
    request_interval: 1000
    use_proxy: false
    default_proxy: ""
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
